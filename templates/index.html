<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impairer — Image Compare Tool</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Header -->
    <header id="header">
        <h1>Impairer</h1>
        <div id="folder-bar">
            <input type="text" id="folder-input" placeholder="Paste folder path (e.g. C:\Photos\Shoot01)" spellcheck="false">
            <button id="filter-toggle" title="Toggle filters">&#9660;</button>
            <button id="browse-btn" title="Browse for folder">Browse</button>
            <button id="load-btn">Load</button>
        </div>
    </header>

    <!-- Filter accordion -->
    <div id="filter-bar">
        <div id="filter-panel" class="hidden">
            <div id="filter-formats">
                <span class="filter-label">Formats:</span>
                <label><input type="checkbox" class="fmt-cb" value=".jpg" checked> JPG</label>
                <label><input type="checkbox" class="fmt-cb" value=".jpeg" checked> JPEG</label>
                <label><input type="checkbox" class="fmt-cb" value=".png" checked> PNG</label>
                <label><input type="checkbox" class="fmt-cb" value=".webp" checked> WebP</label>
            </div>
            <div id="filter-name">
                <span class="filter-label">Filename:</span>
                <input type="text" id="filter-text" placeholder="Filter text or pattern" spellcheck="false">
                <label><input type="radio" name="filter-mode" value="starts" checked> Starts with</label>
                <label><input type="radio" name="filter-mode" value="contains"> Contains</label>
                <label><input type="radio" name="filter-mode" value="ends"> Ends with</label>
                <label><input type="radio" name="filter-mode" value="regex"> Regex</label>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar" class="hidden">
        <div id="mode-toggles">
            <button class="mode-btn active" data-mode="sidebyside">Side by Side</button>
            <button class="mode-btn" data-mode="slider">Slider</button>
        </div>
        <div id="zoom-toggles">
            <button class="zoom-btn active" data-zoom="fit">Fit</button>
            <button class="zoom-btn" data-zoom="actual">Actual Size</button>
            <button class="zoom-btn" data-zoom="2x">2×</button>
            <button class="zoom-btn" data-zoom="4x">4×</button>
        </div>
        <div id="slider-zoom-toggles">
            <button class="slider-zoom-btn active" data-szoom="fit">Fit</button>
            <button class="slider-zoom-btn" data-szoom="actual">Actual Size</button>
            <button class="slider-zoom-btn" data-szoom="2x">2×</button>
            <button class="slider-zoom-btn" data-szoom="4x">4×</button>
        </div>
        <div id="peek-btn">
            <div id="peek-left" title="Preview left image">L</div>
            <div id="peek-right" title="Preview right image">R</div>
        </div>
        <div id="progress">
            <button id="undo-btn" disabled title="Undo last choice">&#x21A9;</button>
            <span id="progress-text"></span>
        </div>
    </div>

    <!-- Comparison area -->
    <div id="comparison-area" class="hidden mode-sidebyside">
        <!-- Peek overlay (single image preview) -->
        <div id="peek-overlay" class="hidden">
            <img id="peek-img" draggable="false" alt="Preview">
        </div>
        <!-- Side by side panels -->
        <div id="sidebyside-container">
            <div class="panel" id="panel-left">
                <img id="img-left" draggable="false" alt="Left image">
            </div>
            <div class="panel" id="panel-right">
                <img id="img-right" draggable="false" alt="Right image">
            </div>
        </div>

        <!-- Slider container -->
        <div id="slider-container">
            <img id="slider-img-base" draggable="false" alt="Base image">
            <div id="slider-overlay">
                <img id="slider-img-overlay" draggable="false" alt="Overlay image">
            </div>
            <div id="slider-divider"></div>
        </div>
    </div>

    <!-- Controls row -->
    <div id="controls" class="hidden">
        <div class="control-col">
            <span class="filename" id="filename-left" title=""></span>
            <button class="choose-btn" id="choose-left">&#10004; Choose</button>
        </div>
        <div id="back-to-pile-controls">
            <button class="pile-btn" id="pile-left" title="Send left image to back of pile">&#8635; Send to back</button>
            <button class="pile-btn" id="pile-right" title="Send right image to back of pile">&#8635; Send to back</button>
        </div>
        <div class="control-col">
            <span class="filename" id="filename-right" title=""></span>
            <button class="choose-btn" id="choose-right">&#10004; Choose</button>
        </div>
    </div>

    <!-- Done overlay -->
    <div id="done-overlay" class="hidden">
        <div id="done-card">
            <h2>Winner!</h2>
            <img id="done-image" draggable="false" alt="Winner image">
            <p id="done-filename"></p>
            <button id="done-undo" class="hidden" title="Undo last choice">&#x21A9;&nbsp;Undo</button>
            <button id="done-keep">&#128230; Copy to Keep</button>
            <button id="done-restart">Load Another Folder</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
